<!DOCTYPE html>
<html>
  <head>
    <title>RollTime</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/png" href="" />
  </head>
  <body>
    <h1>RollTime</h1>
    <button id="connectBleButton">Connect to BLE Device</button>
    <button id="disconnectBleButton">Disconnect BLE Device</button>
    <p>
      BLE state:
      <strong
        ><span id="bleState" style="color: #d13a30">Disconnected</span></strong
      >
    </p>

    <span>
      <h2>Timer Mode</h2>
      <select size="3" name="timerMode" id="timerMode">
        <option value="0">TIMER</option>
        <option selected="selected" value="1">COUNTDOWN</option>
        <option value="2">INTERVAL</option>
      </select>
      <button id="newTimerButton">New Timer</button>
    </span>

    <span id="workInputContainer">
      <h2>Work Time</h2>
      <label for="hours">Hours:</label>
      <input type="number" id="workHours" name="workHours" min="0" value="0" />
      <label for="minutes">Minutes:</label>
      <input
        type="number"
        id="workMinutes"
        name="workMinutes"
        min="0"
        max="59"
        value="0"
      />
      <label for="seconds">Seconds:</label>
      <input
        type="number"
        id="workSeconds"
        name="workSeconds"
        min="0"
        max="59"
        value="30"
      />
    </span>

    <span id="restInputContainer">
      <h2>Rest Time Time</h2>
      <label for="hours">Hours:</label>
      <input type="number" id="restHours" name="restHours" min="0" value="0" />
      <label for="minutes">Minutes:</label>
      <input
        type="number"
        id="restMinutes"
        name="restMinutes"
        min="0"
        max="59"
        value="0"
      />
      <label for="seconds">Seconds:</label>
      <input
        type="number"
        id="restSeconds"
        name="restSeconds"
        min="0"
        max="59"
        value="10"
      />
      <label for="rounds">Rounds:</label>
      <input
        type="number"
        id="rounds"
        name="rounds"
        min="0"
        max="99"
        value="3"
      />
    </span>

    <h2>Time</h2>
    <p><span id="valueContainer">00:00:00</span></p>
    <button id="onButton">START</button>
    <button id="offButton">STOP</button>
    <!-- <button id="testButton">TEST</button> -->
  </body>
  <script>
    // DOM Elements
    const connectButton = document.getElementById("connectBleButton");
    const disconnectButton = document.getElementById("disconnectBleButton");
    const onButton = document.getElementById("onButton");
    const offButton = document.getElementById("offButton");
    // const testButton = document.getElementById("testButton");
    const retrievedValue = document.getElementById("valueContainer");
    const bleStateContainer = document.getElementById("bleState");
    const timerModeSelect = document.getElementById("timerMode");
    const restInputContainer = document.getElementById("restInputContainer");
    const workInputContainer = document.getElementById("workInputContainer");
    const newTimerButton = document.getElementById("newTimerButton");
    const workHoursInput = document.getElementById("workHours");
    const workMinutesInput = document.getElementById("workMinutes");
    const workSecondsInput = document.getElementById("workSeconds");
    const restHoursInput = document.getElementById("restHours");
    const restMinutesInput = document.getElementById("restMinutes");
    const restSecondsInput = document.getElementById("restSeconds");
    const roundsInput = document.getElementById("rounds");

    //Define BLE Device Specs
    var deviceName = "RollTime";
    var bleService = "00000000-0000-0000-0000-000000000001";
    var timerDisplayCharacteristic = "00000000-0000-0000-0000-000000000002";
    var timerControlCharacteristic = "00000000-0000-0000-0000-000000000003";
    var newTimerCharacteristic = "00000000-0000-0000-0000-000000000004";

    //Global Variables to Handle Bluetooth
    var bleServer;
    var bleServiceFound;
    var sensorCharacteristicFound;
    var timerMode = 1;

    // Connect Button (search for BLE Devices only if BLE is available)
    connectButton.addEventListener("click", (event) => {
      if (isWebBluetoothEnabled()) {
        connectToDevice();
      }
    });

    // Disconnect Button
    disconnectButton.addEventListener("click", disconnectDevice);

    // Write to the ESP32 LED Characteristic
    onButton.addEventListener("click", () => writeControlCharacteristic(1));
    offButton.addEventListener("click", () => writeControlCharacteristic(0));
    // testButton.addEventListener("click", () => writeControlCharacteristic(2));

    // Check if BLE is available in your Browser
    function isWebBluetoothEnabled() {
      if (!navigator.bluetooth) {
        console.log("Web Bluetooth API is not available in this browser!");
        bleStateContainer.innerHTML =
          "Web Bluetooth API is not available in this browser!";
        return false;
      }
      console.log("Web Bluetooth API supported in this browser.");
      return true;
    }

    // Connect to BLE Device and Enable Notifications
    function connectToDevice() {
      console.log("Initializing Bluetooth...");
      navigator.bluetooth
        .requestDevice({
          filters: [{ name: deviceName }],
          optionalServices: [bleService],
        })
        .then((device) => {
          console.log("Device Selected:", device.name);
          bleStateContainer.innerHTML = "Connected to device " + device.name;
          bleStateContainer.style.color = "#24af37";
          device.addEventListener("gattservicedisconnected", onDisconnected);
          return device.gatt.connect();
        })
        .then((gattServer) => {
          bleServer = gattServer;
          console.log("Connected to GATT Server");
          return bleServer.getPrimaryService(bleService);
        })
        .then((service) => {
          bleServiceFound = service;
          console.log("Service discovered:", service.uuid);
          return service.getCharacteristic(timerDisplayCharacteristic);
        })
        .then((characteristic) => {
          console.log("Characteristic discovered:", characteristic.uuid);
          sensorCharacteristicFound = characteristic;
          characteristic.addEventListener(
            "characteristicvaluechanged",
            handleCharacteristicChange
          );
          characteristic.startNotifications();
          console.log("Notifications Started.");
          return characteristic.readValue();
        })
        .then((value) => {
          console.log("Read value: ", value);
          const decodedValue = new TextDecoder().decode(value);
          console.log("Decoded value: ", decodedValue);
          retrievedValue.innerHTML = decodedValue;
        })
        .catch((error) => {
          console.log("Error: ", error);
        });
    }

    function onDisconnected(event) {
      console.log("Device Disconnected:", event.target.device.name);
      bleStateContainer.innerHTML = "Device disconnected";
      bleStateContainer.style.color = "#d13a30";

      connectToDevice();
    }

    function handleCharacteristicChange(event) {
      const newValueReceived = new TextDecoder().decode(event.target.value);
      console.log("Characteristic value changed: ", newValueReceived);
      retrievedValue.innerHTML = newValueReceived;
    }

    function writeControlCharacteristic(value) {
      if (bleServer && bleServer.connected) {
        bleServiceFound
          .getCharacteristic(timerControlCharacteristic)
          .then((characteristic) => {
            console.log(
              "Found the Timer Control characteristic: ",
              characteristic.uuid
            );
            const data = new Uint8Array([value]);
            return characteristic.writeValue(data);
          })
          .catch((error) => {
            console.error(
              "Error writing to the Timer Control characteristic: ",
              error
            );
          });
      }
    }

    function disconnectDevice() {
      console.log("Disconnect Device.");
      if (bleServer && bleServer.connected) {
        if (sensorCharacteristicFound) {
          sensorCharacteristicFound
            .stopNotifications()
            .then(() => {
              console.log("Notifications Stopped");
              return bleServer.disconnect();
            })
            .then(() => {
              console.log("Device Disconnected");
              bleStateContainer.innerHTML = "Device Disconnected";
              bleStateContainer.style.color = "#d13a30";
            })
            .catch((error) => {
              console.log("An error occurred:", error);
            });
        } else {
          console.log("No characteristic found to disconnect.");
        }
      }
    }

    restInputContainer.style.visibility = "hidden";
    timerModeSelect.addEventListener("input", function (event) {
      timerMode = parseInt(event.target.value);
      if (timerMode == 0) {
        workInputContainer.style.visibility = "hidden";
        restInputContainer.style.visibility = "hidden";
      } else if (timerMode == 1) {
        workInputContainer.style.visibility = "visible";
        restInputContainer.style.visibility = "hidden";
      } else {
        workInputContainer.style.visibility = "visible";
        restInputContainer.style.visibility = "visible";
      }
    });

    function writeNewTimerCharacteristic(data) {
      if (bleServer && bleServer.connected) {
        bleServiceFound
          .getCharacteristic(newTimerCharacteristic)
          .then((characteristic) => {
            console.log(
              "Found the New Timer characteristic: ",
              characteristic.uuid
            );
            // const encoder = new TextEncoder();
            // return characteristic.writeValue(encoder.encode("hello").buffer);
            return characteristic.writeValue(data);
          })
          .catch((error) => {
            console.error(
              "Error writing to the New Timer characteristic: ",
              error
            );
          });
      }
    }

    newTimerButton.addEventListener("click", (event) => {
      const data = new Uint8Array([
        timerMode,
        parseInt(workHoursInput.value),
        parseInt(workMinutesInput.value),
        parseInt(workSecondsInput.value),
        parseInt(restHoursInput.value),
        parseInt(restMinutesInput.value),
        parseInt(restSecondsInput.value),
        parseInt(roundsInput.value),
      ]);

      console.log(data);
      writeNewTimerCharacteristic(data);
    });
  </script>
</html>
